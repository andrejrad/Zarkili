name: CI

on:
  pull_request:
    branches: ["main", "master", "develop"]
  push:
    branches: ["main", "master", "develop"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      EXPO_PUBLIC_APP_VARIANT: development
      EXPO_PUBLIC_FIREBASE_API_KEY: test-api-key
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: test.firebaseapp.com
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: test-project
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: test.appspot.com
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789"
      EXPO_PUBLIC_FIREBASE_APP_ID: "1:123456789:web:abcdef"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Tests
        run: npm run test -- --watch=false --ci

      - name: Web routing smoke tests
        run: npm run test:smoke:web

      - name: Native shell smoke tests
        run: npm run test:smoke:native

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Firestore rules tests
        run: npm run test:rules
